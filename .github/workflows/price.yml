name: Cybergate price tracker

on:
  schedule:
    - cron: "0 0-5,12-23 * * *"   # every hour on the hour, 6:00 AM–11:00 PM (CDMX, UTC-6)
    - cron: "35 9 * * *"          # single overnight run, 3:35 AM CDMX
  workflow_dispatch:              # manual run button

permissions:
  contents: write                 # to commit the state file back to the repo

concurrency:
  group: cybergate-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4

      - name: Check prices and stock
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cybergate_tracker.py

      - name: Commit state if changed
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update state [skip ci]"
            git push
          else
            echo "No state changes."
          fi
