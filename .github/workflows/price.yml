name: Cybergate price tracker

on:
  schedule:
    - cron: "*/20 0-5,12-23 * * *"   # every 20 min (:00, :20, :40), 6:00 AM–11:00 PM (CDMX, UTC-6)
    - cron: "35 9 * * *"             # single overnight run, 3:35 AM CDMX
  workflow_dispatch:              # manual run button

permissions:
  contents: write                 # to commit the state file back to the repo

concurrency:
  group: cybergate-tracker
  cancel-in-progress: false

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0            # full history so 'pull --rebase' works cleanly

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install cloudscraper beautifulsoup4

      - name: Check prices and stock
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python cybergate_tracker.py

      - name: Commit state if changed
        run: |
          if [[ -z "$(git status --porcelain state.json)" ]]; then
            echo "No state changes."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp state.json /tmp/state.json
          for i in 1 2 3; do
            git add state.json
            git commit -m "Update state [skip ci]" || true
            if git push; then
              echo "Pushed on attempt $i."
              exit 0
            fi
            echo "Remote moved; syncing to it and reapplying our state (attempt $i)..."
            git fetch origin main
            git reset --hard origin/main
            cp /tmp/state.json state.json
          done
          echo "Could not push after 3 attempts."
          exit 1
